name: Release

# Two-stage release flow, forced by GitHub's immutable-releases
# policy (assets can't be added after publish — the old job did a
# `curl -X POST .../assets` against the already-published release,
# which returns HTTP 422 under immutable releases, the same failure
# the CLI hit in #1569). The fix is to attach assets while the
# release is still a *draft*. Naïvely you'd expect `release: created`
# to fire for draft saves, but GitHub Actions filters release events
# on drafts: nothing fires until the release becomes visible. So the
# prepare stage runs from `workflow_dispatch` instead — the
# maintainer drives it from the Actions UI.
#
# Stage 1 — prepare-draft (`workflow_dispatch`):
#   Maintainer opens Actions → "Release" → "Run workflow" → enters an
#   explicit semver `tag` (e.g. `1.4.2`). The workflow builds and
#   signs the three artifacts (`mergify-firefox-<tag>.zip`,
#   `mergify-chrome-<tag>.zip`, `mergify-safari-<tag>.pkg`) on
#   `macos-15` (Xcode is needed for the Safari `.pkg`) and creates the
#   GitHub Release as a *draft* with all three assets attached and
#   notes auto-generated from the commit log via `--generate-notes`.
#
# Stage 2 — publish (`release: published`):
#   Maintainer goes to Releases, reviews the draft (notes + asset
#   list), optionally edits, clicks "Publish release". This fires
#   `release: published`. First we ASSERT the three expected asset
#   names are present (sanity net if the release was created some
#   other way, e.g. straight from the Releases UI without binaries).
#   Then, gated on that assert, three independent jobs push the
#   *reviewed bytes* to the stores — each downloads only its own asset
#   off the published release and never rebuilds, so what ships equals
#   what the maintainer reviewed:
#     - Chrome Web Store: `chrome-webstore-upload-cli` uploads and
#       publishes `mergify-chrome-<tag>.zip`.
#     - Firefox AMO: `web-ext sign --channel listed` submits
#       `mergify-firefox-<tag>.zip` for Mozilla's review queue. web-ext
#       can only sign a *source directory*, never a prebuilt zip, so
#       the reviewed asset is unzipped and web-ext repackages the same
#       files — identical contents, fresh archive container.
#     - Safari: `publish-safari-extension.sh` notarizes and staples
#       `mergify-safari-<tag>.pkg`. Notarization runs post-publish, so
#       the stapled pkg can't replace the immutable release asset; only
#       the Apple-side notarization (Gatekeeper online check) persists.
#       See RELEASING.md for that tradeoff.
#   The three store jobs are independent: one failing doesn't block the
#   others, and a red job flags exactly which store needs a manual
#   retry. The release is immutable from this point on.
#
# Store pushes only ever fire on Publish (never on the draft-building
# dispatch stage) and only for full releases (pre-releases are
# skipped), so a draft never reaches a public store — the human
# draft→Publish gate is the whole point. Versions are explicit semver
# (no calver auto-compute) because the web stores need monotonic
# version numbers under the existing scheme.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: |
          Release version to publish, semver `X.Y.Z` (e.g. `1.4.2`).
          Used verbatim as the git tag, the release title, and the
          `VERSION` stamped into the build (so it ends up in the
          artifact names and the manifest).
        required: true
        type: string
      target_commitish:
        description: |
          Branch or commit SHA to tag. Defaults to the branch the
          workflow runs from — keep as-is unless you're cherry-
          picking a release commit off an older line.
        required: false
        type: string
        default: ''
  release:
    types: [published]

# Serialize runs that could collide on the same tag. Explicit-tag
# dispatches and `release: published` runs key off the tag itself so
# unrelated releases run in parallel. Don't cancel-in-progress: a
# build that's cut short would leave the draft half-populated, which
# is worse than letting it finish.
concurrency:
  group: release-${{ github.event_name }}-${{ inputs.tag || github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  # ---------------- Stage 1: prepare draft ----------------

  prepare-draft:
    name: build artifacts and create draft release
    if: github.event_name == 'workflow_dispatch'
    runs-on: macos-15
    permissions:
      # `gh release create` writes the release.
      contents: write
    steps:
      # Validate the tag shape before the ~10 min build so a typo
      # fails in seconds. `gh release create` would accept any string,
      # so the check lives here; the value also flows into artifact
      # names and the manifest, where garbage would be silently baked
      # into a shipped build.
      - name: Validate tag
        env:
          INPUT_TAG: ${{ inputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          if ! [[ "${INPUT_TAG}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::tag '${INPUT_TAG}' doesn't match the X.Y.Z semver shape"
            exit 1
          fi

      - uses: actions/checkout@v7.0.0
        with:
          # `--generate-notes` needs full history to walk back to the
          # previous tag.
          fetch-depth: 0
          fetch-tags: true

      - name: Install dependencies
        run: |
          brew install gnu-sed

          sudo xcode-select -s /Applications/Xcode.app

      - name: Decode and install certificate
        run: |
          echo "$CERTIFICATE_P12" | base64 --decode > certificate.p12
          security create-keychain -p password build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p password build.keychain
          security import certificate.p12 -k build.keychain -P "$CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/productbuild -T /usr/bin/xcodebuild
          security set-key-partition-list -S apple-tool:,apple: -s -k password build.keychain
        env:
          CERTIFICATE_P12: ${{ secrets.BROWSER_EXT_APPLE_CERTIFICATE_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.BROWSER_EXT_APPLE_CERTIFICATE_PASSWORD }}

      - name: Build
        env:
          SIGN: 1
          VERSION: ${{ inputs.tag }}
        run: |
          make

      - name: Create draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          # Read inputs via env, not `${{ }}` interpolation, so a tag
          # or commitish value containing shell metacharacters can't
          # break out of the script. With direct interpolation,
          # `inputs.tag = "foo'; rm -rf /; '"` would render the script
          # as runnable injected commands; through env they reach bash
          # as plain string values.
          INPUT_TAG: ${{ inputs.tag }}
          INPUT_TARGET: ${{ inputs.target_commitish }}
        shell: bash
        run: |
          set -euo pipefail
          # Build the gh argument list as an array — keeps each element
          # a single argv slot regardless of the value's contents.
          args=(
              "${INPUT_TAG}"
              --draft
              --generate-notes
              --title "${INPUT_TAG}"
          )
          if [ -n "${INPUT_TARGET}" ]; then
              args+=(--target "${INPUT_TARGET}")
          fi
          # `--draft` keeps the release mutable until the maintainer
          # clicks Publish. `--generate-notes` builds a changelog from
          # PRs merged since the previous tag — overridable in the UI
          # before publish if needed. Asset names are deterministic
          # from the tag, so list them explicitly rather than glob.
          gh release create "${args[@]}" \
            "mergify-firefox-${INPUT_TAG}.zip" \
            "mergify-chrome-${INPUT_TAG}.zip" \
            "mergify-safari-${INPUT_TAG}.pkg"

          url=$(gh release view "${INPUT_TAG}" --json url --jq .url)
          echo
          echo "Draft release created: ${url}"
          echo "Review the draft and click Publish in the Releases UI to ship."

  # ---------------- Stage 2: assert on publish ----------------

  assert-assets-present:
    name: assert artifacts attached
    if: github.event_name == 'release' && github.event.action == 'published'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check expected assets are on the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ github.event.release.tag_name }}
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t attached < <(gh release view "$TAG" --json assets --jq '.assets[].name')
          echo "Assets on $TAG:"
          printf '  %s\n' "${attached[@]}"

          expected=(
            "mergify-firefox-${TAG}.zip"
            "mergify-chrome-${TAG}.zip"
            "mergify-safari-${TAG}.pkg"
          )
          missing=()
          for asset in "${expected[@]}"; do
            printf '%s\n' "${attached[@]}" | grep -Fqx "$asset" || missing+=("$asset")
          done
          if (( ${#missing[@]} > 0 )); then
            cat <<EOF >&2
          ::error::Release $TAG is missing assets: ${missing[*]}

          Artifacts are attached by the 'prepare-draft' job, which runs from
          Actions → "Release" → "Run workflow". Did you create this release
          through the Releases UI directly instead? That path doesn't attach
          the build artifacts, and the release is now immutable so they can't
          be backfilled.

          Recovery: delete this release, then re-create it via Actions →
          "Release" → "Run workflow" with the same tag.
          EOF
            exit 1
          fi
          echo "All expected assets present."

  # ---------------- Stage 2: push reviewed bytes to the stores ----------------
  #
  # All three jobs gate on `assert-assets-present` so a release missing its
  # binaries never reaches a store, and skip pre-releases so only a real
  # Publish ships. Each downloads only its own reviewed asset (no rebuild) and
  # routes every secret/tag value through `env:` — never inline `${{ }}` in a
  # `run:` body — so a hostile value can't break out of the shell.

  publish-chrome:
    name: publish to Chrome Web Store
    needs: assert-assets-present
    if: github.event_name == 'release' && github.event.action == 'published' && github.event.release.prerelease == false
    runs-on: ubuntu-latest
    permissions:
      # Read-only: download the asset off the published release.
      contents: read
    steps:
      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Download the reviewed Chrome asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ github.event.release.tag_name }}
        shell: bash
        run: |
          set -euo pipefail
          gh release download "$TAG" --pattern "mergify-chrome-${TAG}.zip" --clobber

      - name: Upload and publish to the Chrome Web Store
        env:
          # chrome-webstore-upload-cli reads CLIENT_ID/CLIENT_SECRET/
          # REFRESH_TOKEN/EXTENSION_ID/PUBLISHER_ID from the environment; the
          # repo secrets are BROWSER_EXT_GOOGLE_*-named and mapped to those.
          # PUBLISHER_ID (the developer-account id, not the extension id) is
          # required since cli@4 moved to the Chrome Web Store API v2, whose
          # endpoints are scoped under publishers/<id>/items/<extension-id>.
          CLIENT_ID: ${{ secrets.BROWSER_EXT_GOOGLE_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.BROWSER_EXT_GOOGLE_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.BROWSER_EXT_GOOGLE_REFRESH_TOKEN_SILEHT }}
          EXTENSION_ID: ${{ secrets.BROWSER_EXT_GOOGLE_EXTENSION_ID }}
          PUBLISHER_ID: ${{ secrets.BROWSER_EXT_GOOGLE_PUBLISHER_ID }}
          TAG: ${{ github.event.release.tag_name }}
        shell: bash
        run: |
          set -euo pipefail
          # No subcommand = upload + publish in one shot. v4 dropped the
          # old `--auto-publish` flag (upload+publish is now the default
          # when no command is given); pinned to major 4 so the CLI's
          # contract can't shift under us.
          npx --yes chrome-webstore-upload-cli@4 \
            --source "mergify-chrome-${TAG}.zip" \
            --extension-id "$EXTENSION_ID"

  publish-firefox:
    name: publish to Firefox Add-ons (AMO)
    needs: assert-assets-present
    if: github.event_name == 'release' && github.event.action == 'published' && github.event.release.prerelease == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Download the reviewed Firefox asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ github.event.release.tag_name }}
        shell: bash
        run: |
          set -euo pipefail
          gh release download "$TAG" --pattern "mergify-firefox-${TAG}.zip" --clobber

      - name: Sign and submit to AMO (listed)
        env:
          # web-ext reads these exact env names for the AMO JWT creds.
          WEB_EXT_API_KEY: ${{ secrets.BROWSER_EXT_MOZILLA_ISSUER }}
          WEB_EXT_API_SECRET: ${{ secrets.BROWSER_EXT_MOZILLA_JWT_SECRET }}
          TAG: ${{ github.event.release.tag_name }}
        shell: bash
        run: |
          set -euo pipefail
          # web-ext can only sign a *source directory*, never a prebuilt
          # zip, so unzip the reviewed asset and let web-ext repackage the
          # identical files. `--channel listed` submits the version to
          # Mozilla's review queue, which is human and asynchronous.
          # `--approval-timeout 0` makes web-ext return as soon as the
          # version is uploaded instead of blocking on approval — without
          # it, web-ext waits up to 15 min and then *errors out* on the
          # still-pending review, failing the job even though the submit
          # succeeded.
          rm -rf firefox-src
          unzip -q "mergify-firefox-${TAG}.zip" -d firefox-src
          npx --yes web-ext@10 sign \
            --source-dir firefox-src \
            --channel listed \
            --approval-timeout 0

  publish-safari:
    name: notarize and staple the Safari pkg
    needs: assert-assets-present
    if: github.event_name == 'release' && github.event.action == 'published' && github.event.release.prerelease == false
    # macOS runner: notarytool/stapler ship with Xcode, not on Linux.
    runs-on: macos-15
    permissions:
      contents: read
    steps:
      # Check out at the release tag so publish-safari-extension.sh is the
      # exact version that shipped, not whatever is on the default branch.
      - uses: actions/checkout@v7.0.0
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Install the App Store Connect API key
        env:
          APPLE_CONNECT_KEY_P8: ${{ secrets.BROWSER_EXT_APPLE_CONNECT_KEY_P8 }}
        shell: bash
        run: |
          set -euo pipefail
          # publish-safari-extension.sh hardcodes this path and the
          # matching key id (ASA5Z72QVK); decode the base64 secret into it.
          mkdir -p private_keys
          echo "$APPLE_CONNECT_KEY_P8" | base64 --decode > private_keys/AuthKey_ASA5Z72QVK.p8

      - name: Download the reviewed Safari asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ github.event.release.tag_name }}
        shell: bash
        run: |
          set -euo pipefail
          gh release download "$TAG" --pattern "mergify-safari-${TAG}.pkg" --clobber

      - name: Notarize and staple
        env:
          TAG: ${{ github.event.release.tag_name }}
        shell: bash
        run: |
          set -euo pipefail
          # "We only need to run the script": it submits to notarytool
          # --wait then staples the local copy. That stapled pkg can't be
          # re-attached to the immutable release; the Apple-side
          # notarization registration is what persists. See RELEASING.md.
          ./publish-safari-extension.sh "./mergify-safari-${TAG}.pkg"
